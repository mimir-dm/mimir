name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-desktop:
    name: Build Desktop Applications
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            target: 'aarch64-apple-darwin'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            target: 'x86_64-apple-darwin'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            target: 'x86_64-unknown-linux-gnu'
            args: ''
          - platform: 'windows-latest'
            target: 'x86_64-pc-windows-msvc'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        working-directory: ./crates/mimir/frontend
        run: npm ci

      - name: Build mimir-mcp sidecar (unix)
        if: matrix.platform != 'windows-latest'
        env:
          TAURI_ENV_TARGET_TRIPLE: ${{ matrix.target }}
        run: bash scripts/build-sidecar.sh

      - name: Build mimir-mcp sidecar (windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        env:
          TAURI_ENV_TARGET_TRIPLE: ${{ matrix.target }}
        run: .\scripts\build-sidecar.ps1

      - name: Upload mimir-mcp binary (unix)
        if: matrix.platform != 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: mimir-mcp-${{ matrix.target }}
          path: crates/mimir/binaries/mimir-mcp-${{ matrix.target }}

      - name: Upload mimir-mcp binary (windows)
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: mimir-mcp-${{ matrix.target }}
          path: crates/mimir/binaries/mimir-mcp-${{ matrix.target }}.exe

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          TAURI_ENV_TARGET_TRIPLE: ${{ matrix.target }}
        with:
          projectPath: ./crates/mimir
          tagName: app-v__VERSION__
          releaseName: 'Mimir v__VERSION__'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  upload-mcp-binaries:
    name: Attach MCP binaries to release
    needs: build-desktop
    runs-on: ubuntu-latest
    steps:
      - name: Download all mimir-mcp artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: mimir-mcp-*
          path: mcp-binaries
          merge-multiple: false

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Upload MCP binaries to release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          # Wait for draft release to exist (created by tauri-action)
          for i in $(seq 1 30); do
            RELEASE_ID=$(curl -sL \
              -H "Authorization: token ${GITHUB_TOKEN}" \
              "https://api.github.com/repos/${{ github.repository }}/releases/tags/app-v${{ steps.version.outputs.version }}" \
              | jq -r '.id // empty')
            if [ -n "$RELEASE_ID" ]; then
              break
            fi
            echo "Waiting for release to be created... ($i/30)"
            sleep 10
          done

          if [ -z "$RELEASE_ID" ]; then
            echo "ERROR: Release not found after waiting"
            exit 1
          fi

          echo "Found release ID: $RELEASE_ID"

          # Upload each binary
          for dir in mcp-binaries/mimir-mcp-*/; do
            for file in "$dir"*; do
              filename=$(basename "$file")
              echo "Uploading $filename..."
              curl -sL \
                -X POST \
                -H "Authorization: token ${GITHUB_TOKEN}" \
                -H "Content-Type: application/octet-stream" \
                "https://uploads.github.com/repos/${{ github.repository }}/releases/${RELEASE_ID}/assets?name=${filename}" \
                --data-binary "@${file}"
            done
          done
