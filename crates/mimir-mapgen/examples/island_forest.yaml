name: "Forest Island"
width: 32
height: 32
seed: 42

noise:
  octaves: 6
  persistence: 0.5
  lacunarity: 2.0
  scale: 0.03

island_mode: 1.0

terrain:
  slots:
    - texture: "res://textures/terrain/terrain_moss.png"
      lower: 0.0
      upper: 0.35
    - texture: "res://textures/terrain/terrain_grass.png"
      lower: 0.3
      upper: 0.6
    - texture: "res://textures/terrain/terrain_dry_grass.png"
      lower: 0.55
      upper: 0.8
    - texture: "res://textures/terrain/terrain_dirt.png"
      lower: 0.75
      upper: 1.0
  blend_width: 0.05
  smooth_blending: false

trees:
  - tree:
      textures:
        - "res://textures/objects/more_trees/oak_01.png"
        - "res://textures/objects/more_trees/oak_02.png"
        - "res://textures/objects/more_trees/oak_03.png"
      min_distance: 300.0
      noise_lower: 0.0
      noise_upper: 0.55
      probability: 0.8
      scale_min: 0.8
      scale_max: 1.2
      layer: 300
      random_rotation: true
      random_mirror: true

clutter:
  - textures:
      - "res://textures/objects/vegetation/grass/grass_01.png"
      - "res://textures/objects/vegetation/grass/grass_02.png"
    min_distance: 80.0
    noise_lower: 0.2
    noise_upper: 0.65
    probability: 0.5
    scale_min: 0.5
    scale_max: 1.0
    layer: 100
    random_rotation: true
    random_mirror: false

water:
  threshold: 0.85
  deep_color: "ff1a5040"
  shallow_color: "ff2a8a6a"
  blend_distance: 45.0
  min_contour_points: 20
  smooth_iterations: 5
  pixels_per_cell: 64.0
